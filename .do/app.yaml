# DigitalOcean App Platform — spec d'application
# Documentation : https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Cette spec définit un site STATIQUE Astro (pas de SSR, pas de runtime serveur).
# Le build produit dist/ qui est servi via le CDN DO.

name: mesdonneeslocales
region: fra  # Francfort — meilleure latence pour la France

static_sites:
  - name: web

    # Source : repo GitHub public, branche main, auto-deploy ON
    git:
      repo_clone_url: https://github.com/bobcab/mesdonneeslocales.git
      branch: main

    # Source dir relative au repo (root par défaut, explicite ici)
    source_dir: /

    # Build Astro
    build_command: npm run build
    output_dir: dist

    # Environnement Node.js — DO détecte via package.json mais on l'explicite
    environment_slug: node-js

    # Force Node 22 (matche engines.node de package.json)
    envs:
      - key: NODE_VERSION
        value: "22"
        scope: BUILD_TIME

    # Routes : Astro génère /path/index.html avec trailingSlash:'always'
    # DO sert ça nativement — pas besoin de rewrites custom
    routes:
      - path: /

    # Document d'erreur custom (Astro génère /404.html à la racine)
    error_document: 404.html

    # Document d'index par défaut (Astro génère /index.html pour chaque dossier)
    index_document: index.html
